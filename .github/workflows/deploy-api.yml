name: Deploy Flask API

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVICE_NAME: ta-api
  REGION: southamerica-east1
  ENV_VARS: DB_HOST=10.10.1.10,DB_PORT=5432,DB_NAME=appdb,DB_USER=appuser,SECRET_KEY=supersecretkey,JWT_ACCESS_EXPIRES_SECONDS=3600
  SECRETS: DB_PASSWORD=DB_PASSWORD:latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker

      - name: Build & Push Docker image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --clear-vpc-connector \
            --network=app-vpc \
            --network-tags=run-backend \
            --subnet=run-subnet \
            --vpc-egress=private-ranges-only \
            --update-env-vars ${{ env.ENV_VARS }} \
            --update-secrets ${{ env.SECRETS }} \
            --allow-unauthenticated 
